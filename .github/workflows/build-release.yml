name: Build and Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (tag/branch) to build'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # 分支 push: 只做语法检查，不打包
  check:
    if: github.ref_type == 'branch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v5

      - run: uv sync

      - name: Python syntax check
        run: uv run python -m compileall . -q -x '\.venv|__pycache__|output'

  # tag push / 手动触发: 完整打包 + Release
  build:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup UV
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Python syntax check
        run: uv run python -m compileall . -q -x '\.venv|__pycache__|output'

      - name: Setup MSVC compiler environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Auto-detect plugin dependencies
        shell: pwsh
        run: |
          uv run python scripts/gen_nuitka_plugin_deps.py > nuitka_plugin_deps.txt
          Get-Content nuitka_plugin_deps.txt

      - name: Extract version from tag or main.py
        shell: pwsh
        id: get_version
        run: |
          # 如果是从 v* tag 触发，取 tag 名；否则从 main.py 读 VERSION
          if ("${{ github.ref_type }}" -eq "tag") {
            $ver = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $line = Select-String -Path main.py -Pattern '^VERSION\s*=\s*"(.*)"'
            $ver = $line.Matches.Groups[1].Value -replace '^v', ''
          }
          # 确保是 a.b.c.d 格式（Nuitka 要求）
          $parts = $ver.Split('.')
          while ($parts.Count -lt 4) { $parts += '0' }
          $fileVer = $parts[0..3] -join '.'
          "NUITKA_VERSION=$fileVer" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Version: $fileVer"

      - name: Compile with Nuitka
        shell: pwsh
        run: |
          $extras = @()
          Get-Content nuitka_plugin_deps.txt | ForEach-Object { $extras += $_ }
          uv run nuitka @extras `
            --onefile --standalone `
            --jobs=3 --lto=no `
            --assume-yes-for-downloads `
            --output-dir=output `
            --windows-disable-console `
            --windows-icon-from-ico=res/ico/favicon.ico `
            --enable-plugin=pyside6 --include-qt-plugins=sensible,styles `
            --include-data-dir=res/ico=res/ico `
            --follow-imports `
            --remove-output `
            --show-memory `
            --company-name="Tiosa" `
            --product-name="Touda WiFi Float" `
            --file-description="汕大校园网工具 - 悬浮球版" `
            --file-version="$env:NUITKA_VERSION" `
            --product-version="$env:NUITKA_VERSION" `
            --copyright="Copyright (c) 2025-2026 Tiosa. All rights reserved." `
            main.py

      - name: Prepare release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist/plugins -Force
          Copy-Item output/main.exe dist/
          Copy-Item res dist/ -Recurse -Force
          Copy-Item plugins/plugin_sdk.py dist/plugins/
          Get-ChildItem plugins -Directory | Where-Object { $_.Name -ne 'example' } | ForEach-Object {
            $dest = "dist/plugins/$($_.Name)"
            Copy-Item $_.FullName $dest -Recurse -Force
          }
          Get-ChildItem dist -Directory -Recurse -Filter __pycache__ | Remove-Item -Recurse -Force

      - name: Upload manual build artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: touda-wifi-float-manual-build
          path: dist/

      - name: Create ZIP archive
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $zipName = "touda-wifi-float-${{ github.ref_name }}.zip"
          Compress-Archive -Path dist/* -DestinationPath $zipName -Force
          "ZIP_FILE=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload to GitHub Release (v* tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_FILE }}
          name: Touda WiFi Float ${{ github.ref_name }}
          body: |
            ## 下载说明

            ### 📦 完全包（含所有插件）
            - 下载 `touda-wifi-float-${{ github.ref_name }}.zip`
            - 解压后运行 `main.exe` 即可

            ### 🚀 首次使用
            1. 解压到任意目录
            2. 运行 `main.exe`
            3. 在托盘图标右键 → 设置 → 配置 WiFi 账号和 WebVPN

            ---
            🤖 Generated by GitHub Actions
