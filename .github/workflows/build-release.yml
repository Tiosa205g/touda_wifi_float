name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (tag/branch) to build'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup UV
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Setup MSVC compiler environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile with Nuitka
        run: |
          uv run nuitka --lto=no --jobs=2 --onefile --standalone `
            --output-dir=output --windows-console-mode=disable `
            --enable-plugin=pyside6 --include-qt-plugins=sensible,styles `
            --include-data-files=res/ico/*.ico=res/ico/ `
            --windows-disable-console --follow-imports `
            --show-progress --show-memory `
            main.py

      - name: Prepare release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force
          Copy-Item output/main.exe dist/
          Copy-Item res dist/ -Recurse -Force
          Get-ChildItem plugins -Directory | Where-Object { $_.Name -ne 'example' } | ForEach-Object {
            $dest = "dist/plugins/$($_.Name)"
            Copy-Item $_.FullName $dest -Recurse -Force
          }

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "manual-${{ github.run_number }}"
          }
          $zipName = "touda-wifi-float-$tag.zip"
          Compress-Archive -Path dist/* -DestinationPath $zipName -Force
          "ZIP_FILE=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_FILE }}
