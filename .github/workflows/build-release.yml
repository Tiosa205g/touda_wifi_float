name: Build and Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (tag/branch) to build'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup UV
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Python syntax check
        run: uv run python -m compileall . -q -x '\.venv|__pycache__|output'

      - name: Setup MSVC compiler environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Auto-detect plugin dependencies
        shell: pwsh
        run: |
          uv run python scripts/gen_nuitka_plugin_deps.py > nuitka_plugin_deps.txt
          Get-Content nuitka_plugin_deps.txt

      - name: Compile with Nuitka
        shell: pwsh
        run: |
          $extras = @()
          Get-Content nuitka_plugin_deps.txt | ForEach-Object { $extras += $_ }
          uv run nuitka @extras `
            --onefile --standalone `
            --jobs=3 --lto=no `
            --assume-yes-for-downloads `
            --output-dir=output `
            --windows-disable-console `
            --windows-icon-from-ico=res/ico/favicon.ico `
            --enable-plugin=pyside6 --include-qt-plugins=sensible,styles `
            --include-data-dir=res/ico=res/ico `
            --follow-imports `
            --remove-output `
            --show-memory `
            main.py

      - name: Prepare release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force
          Copy-Item output/main.exe dist/
          Copy-Item res dist/ -Recurse -Force
          Copy-Item plugins/plugin_sdk.py dist/plugins/
          Get-ChildItem plugins -Directory | Where-Object { $_.Name -ne 'example' } | ForEach-Object {
            $dest = "dist/plugins/$($_.Name)"
            Copy-Item $_.FullName $dest -Recurse -Force
          }

      - name: Upload test build artifact (push to branch)
        if: github.ref_type == 'branch'
        uses: actions/upload-artifact@v4
        with:
          name: touda-wifi-float-test-build
          path: dist/

      - name: Upload manual build artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: touda-wifi-float-manual-build
          path: dist/

      - name: Create ZIP archive
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $zipName = "touda-wifi-float-${{ github.ref_name }}.zip"
          Compress-Archive -Path dist/* -DestinationPath $zipName -Force
          "ZIP_FILE=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload to GitHub Release (v* tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_FILE }}
